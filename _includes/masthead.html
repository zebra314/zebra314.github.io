{% capture logo_path %}{{ site.logo }}{% endcapture %}
<script src="https://kit.fontawesome.com/b5ce6dfdfd.js" crossorigin="anonymous"></script>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">
          {{ site.masthead_title | default: site.title }}
          {% if site.subtitle %}<span class="site-subtitle">{{ site.subtitle }}</span>{% endif %}
        </a>

        <div class="navbar">
          <ul class="links">
            <li><a href="{{ '/' | relative_url }}">Blog</a></li>
            <li><a href="{{ '/photo/' | relative_url }}">Photo</a></li>
            <li><a href="https://zebra314.github.io/quartz/">Note</a></li>
            <li><a href="{{ '/about/' | relative_url }}">About</a></li>
          </ul>

          <div class="toggle_btn">
            <i class="fa-solid fa-bars" style="color: $text-color;"></i>
          </div>

          <div class="dropdown_menu">
            <h2><a href="{{ '/' | relative_url }}">Blog</a></h2>
            <h2><a href="{{ '/photo/' | relative_url }}">Photo</a></h2>
            <h2><a href="https://zebra314.github.io/quartz/">Note</a></h2>
            <h2><a href="{{ '/about/' | relative_url }}">About</a></h2>
          </div>
        </div>

      </nav>
    </div>
  </div>
</div>

<script>
  const toggleBtn = document.querySelector('.toggle_btn');
  const toggleBtnIcon = document.querySelector('.toggle_btn i');
  const dropdownMenu = document.querySelector('.dropdown_menu');
  const menuItems = dropdownMenu.querySelectorAll('a');

  toggleBtn.onclick = function () {
    if (dropdownMenu.classList.contains('open')) {
      // First, fade out the text
      menuItems.forEach(item => {
        item.style.opacity = '0';
        item.style.transform = 'translateY(-10px)';
      });

      // Wait for fade out animation to complete before closing menu
      setTimeout(() => {
        dropdownMenu.classList.remove('open');
        document.body.style.overflow = 'auto';
        toggleBtnIcon.classList = 'fa-solid fa-bars';
      }, 300);
    } else {
      // Open menu
      dropdownMenu.classList.add('open');
      toggleBtnIcon.classList = 'fa-solid fa-times';
      document.body.style.overflow = 'hidden';
      
      // Fade in items after menu opens
      menuItems.forEach(item => {
        item.style.opacity = '1';
        item.style.transform = 'translateY(0)';
      });
    }
  }
</script>
