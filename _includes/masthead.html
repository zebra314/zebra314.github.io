{% capture logo_path %}{{ site.logo }}{% endcapture %}
<script src="https://kit.fontawesome.com/b5ce6dfdfd.js" crossorigin="anonymous"></script>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">
          {{ site.masthead_title | default: site.title }}
          {% if site.subtitle %}<span class="site-subtitle">{{ site.subtitle }}</span>{% endif %}
        </a>

        <div class="navbar">
          <ul class="links">
            <!-- <li><a href="{{ '/' | relative_url }}">Home</a></li> -->
            <li><a href="{{ '/' | relative_url }}">Blog</a></li>
            <li><a href="https://zebra314.github.io/quartz/">Note</a></li>
            <li><a href="{{ '/project/' | relative_url }}">Project</a></li>
            <li><a href="{{ '/photo/' | relative_url }}">Photo</a></li>
            <li><a href="{{ '/about/' | relative_url }}">About</a></li>
          </ul>

          <div class="toggle_btn">
            <i class="fa-solid fa-bars" style="color: #222831;"></i>
          </div>

          <div class="dropdown_menu">
            <!-- <li><a href="{{ '/' | relative_url }}">Home</a></li> -->
            <li><a href="{{ '/' | relative_url }}">Blog</a></li>
            <li><a href="https://zebra314.github.io/quartz/">Note</a></li>
            <li><a href="{{ '/project/' | relative_url }}">Project</a></li>
            <li><a href="{{ '/photo/' | relative_url }}">Photo</a></li>
            <li><a href="{{ '/about/' | relative_url }}">About</a></li>
          </div>
        </div>

      </nav>
    </div>
  </div>
</div>

<style>
  ul {
    list-style-type: none;
  }

  a {
    text-decoration: none;
  }

  .greedy-nav a {
    white-space: nowrap;
  }

  .navbar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 1rem 0;

    width: 100%;
    height: 60px;
    max-width: 1200px;
    margin: 0 auto;

    padding-right: 2em;
    font-weight: 700;
  }

  .navbar .links {
    display: flex;
    /*place the links in a row*/
    gap: 0.2rem;
  }

  /* Enhance clickable area*/
  .dropdown_menu a {
    display: block;
    padding: 5px 20px;
    width: 100%;
    text-align: center;
  }

  .navbar .toggle_btn {
    display: none;
    /*hide the toggle button*/
  }


  /* Dropdown menu */
  .dropdown_menu {
    position: fixed;
    left: 0;
    width: 100%;
    top: 90px;
    background: #eeeeee;
    backdrop-filter: blur(15px);

    overflow: hidden;

    height: 0;

    transition: height 0.7s cubic-bezier(.25, 1, .30, 1);
  }

  .dropdown_menu.open {
    /* height: 241px; */
    height: calc(100vh - 90px); /* Cover the rest of the screen */
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
  }

  .dropdown_menu li {
    padding: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }

  /* Respponsive navbar */
  @media(min-width: 751px) {
    .navbar .toggle_btn {
      display: none;
      /*hide the toggle button*/
    }
  }

  @media(max-width: 750px) {
    .navbar .links {
      display: none;
      /*hide the links*/
    }

    /*show the toggle button*/
    .navbar .toggle_btn {
      display: block;

    }

    .dropdown_menu {
      display: block;
      left: 0;
      width: 100%;
    }
  }
</style>

<script>
  const toggleBtn = document.querySelector('.toggle_btn');
  const toggleBtnIcon = document.querySelector('.toggle_btn i');
  const dropdown_menu = document.querySelector('.dropdown_menu');

  toggleBtn.onclick = function () {
    dropdown_menu.classList.toggle('open');
    const isOpen = dropdown_menu.classList.contains('open');

    toggleBtnIcon.classList = isOpen
      ? 'fa-solid fa-times'
      : 'fa-solid fa-bars'

    // Prevent body scrolling when the dropdown menu is open
    document.body.style.overflow = isOpen ? 'hidden' : 'auto';
  }
</script>
